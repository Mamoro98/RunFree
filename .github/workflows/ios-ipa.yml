name: Build unsigned iOS IPA

# Produces an UNSIGNED .ipa on a free macOS runner.
# AltStore/SideStore re-signs it on your iPhone with your free Apple ID,
# so no paid Apple Developer Program is needed.

on:
  workflow_dispatch: # run manually from the Actions tab
  push:
    tags:
      - "v*" # or auto-build when you push a version tag

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode 16
        run: |
          XC=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XC" ]; then XC=$(ls -d /Applications/Xcode*.app | sort -V | tail -1); fi
          echo "Selecting $XC"
          sudo xcode-select -s "$XC"
          xcodebuild -version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS deps
        run: npm ci

      - name: Prebuild native iOS project
        run: npx expo prebuild --platform ios --no-install --clean

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Detect scheme + workspace
        id: xc
        working-directory: ios
        run: |
          WS=$(ls -d *.xcworkspace | head -1)
          SCHEME="${WS%.xcworkspace}"
          echo "workspace=$WS"  >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Using workspace=$WS scheme=$SCHEME"

      - name: Archive (unsigned)
        working-directory: ios
        run: |
          xcodebuild \
            -workspace "${{ steps.xc.outputs.workspace }}" \
            -scheme "${{ steps.xc.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/RunFree.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package into .ipa
        run: |
          APP=$(ls -d "$RUNNER_TEMP/RunFree.xcarchive/Products/Applications/"*.app | head -1)
          echo "App bundle: $APP"
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -R "$APP" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -qry RunFree-unsigned.ipa Payload
          ls -lh RunFree-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: RunFree-unsigned-ipa
          path: ${{ runner.temp }}/RunFree-unsigned.ipa
          if-no-files-found: error
          retention-days: 30
